[package]
name = "paylix_payment_vault"
version = "0.1.0"
description = "Paylix one-time SPL payment vault (Solana)"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "paylix_payment_vault"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
# init-if-needed enables the SetAcceptedToken context's account init pattern.
# Reviewed in context — we gate the setter on has_one=owner, so the
# re-initialization attack surface is limited to the owner re-asserting
# their own AcceptedToken row.
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl = "0.30.1"
