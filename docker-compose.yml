services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: paylix
      POSTGRES_USER: paylix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paylix_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paylix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
